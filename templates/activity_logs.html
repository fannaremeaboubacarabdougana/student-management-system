{% extends "base.html" %}

{% block title %}Activity Logs{% endblock %}

{% block content %}

<h2 class="mb-4">

    <i class="bi bi-clock-history"></i>

    Activity Logs

</h2>

<table class="table table-striped table-hover">

    <thead class="table-dark">

        <tr>

            <th>#</th>

            <th>User</th>

            <th>Action</th>

            <th>Date & Time</th>

        </tr>

    </thead>

    <tbody>

        {% for log in logs %}

        <tr>

            <td>{{ loop.index }}</td>

            <td>{{ log.username }}</td>

            <td>{{ log.action }}</td>

            <td>{{ log.created_at.strftime("%d-%m-%Y %H:%M") }}</td>

        </tr>

        {% endfor %}

    </tbody>

</table>

{% endblock %}
