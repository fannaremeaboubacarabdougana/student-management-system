{% extends "base.html" %}

{% block title %}My Profile{% endblock %}

{% block content %}

<div class="row justify-content-center">

    <div class="col-lg-8">

        <div class="card shadow">

            <div class="card-body">

                <div class="text-center mb-4">

                    <div class="rounded-circle bg-primary text-white d-inline-flex justify-content-center align-items-center"
                        style="width:90px;height:90px;font-size:36px;">

                        {{ current_user.username[0]|upper }}

                    </div>

                    <h3 class="mt-3">

                        {{ current_user.username }}

                    </h3>

                    <p class="text-muted">

                        {{ current_user.role|capitalize }}

                    </p>

                </div>

                <hr>

                <form method="POST">

                    <div class="mb-3">

                        <label class="form-label">

                            Username

                        </label>

                        <input type="text" class="form-control" value="{{ current_user.username }}" disabled>

                    </div>

                    <div class="mb-3">

                        <label class="form-label">

                            Email

                        </label>

                        <input type="email" class="form-control" name="email" value="{{ current_user.email }}" required>

                    </div>

                    <hr>

                    <h5>

                        Change Password

                    </h5>

                    <div class="mb-3">

                        <label>

                            Current Password

                        </label>

                        <input type="password" class="form-control" name="current_password">

                    </div>

                    <div class="mb-3">

                        <label>

                            New Password

                        </label>

                        <input type="password" class="form-control" name="new_password">

                    </div>

                    <div class="mb-4">

                        <label>

                            Confirm Password

                        </label>

                        <input type="password" class="form-control" name="confirm_password">

                    </div>

                    <button class="btn btn-primary">

                        <i class="bi bi-save"></i>

                        Save Changes

                    </button>

                </form>

            </div>

        </div>

    </div>

</div>

{% endblock %}
